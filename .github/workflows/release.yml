name: Release
on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  id-token: write

jobs:
  build-binaries:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - bun-darwin-arm64
          - bun-linux-x64
          - bun-linux-arm64
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Build binary
        run: |
          mkdir -p dist/binaries
          bun build packages/cli/src/index.ts --compile --target ${{ matrix.target }} --outfile dist/binaries/intl-ai-${{ matrix.target }}
      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: intl-ai-${{ matrix.target }}
          path: ./dist/binaries/intl-ai-${{ matrix.target }}
          if-no-files-found: error

  publish:
    needs: build-binaries
    runs-on: ubuntu-latest
    environment: npm-publish
    steps:
      - uses: actions/checkout@v6
      - name: Download all binary artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./dist/binaries
          merge-multiple: true
      - uses: pnpm/action-setup@v6
        with:
          version: "10.32.1"
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: "pnpm"
          registry-url: "https://registry.npmjs.org"
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm changeset:version
      - run: pnpm changeset publish
        env:
          # Changesets action reads NPM_TOKEN to generate its internal .npmrc
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          # Also map to NODE_AUTH_TOKEN for the npm CLI directly
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/binaries/intl-ai-*
            packages/api/src/schema/intl-ai.schema.json
