name: Bug Report
description: Report a bug in @intl-ai/unplugin
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug
      placeholder: Tell us what happened...
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Steps to reproduce the bug
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What you expected to happen
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Package Version
      placeholder: e.g., 0.1.0
    validations:
      required: true
  - type: input
    id: node
    attributes:
      label: Node Version
      placeholder: e.g., 20.11.0
  - type: input
    id: bundler
    attributes:
      label: Bundler
      placeholder: e.g., Vite 5.0, Next.js 16
  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Any other context about the problem
